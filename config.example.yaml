# seasoned-wallpaper example configuration.
#
# Install path (Linux/macOS): $XDG_CONFIG_HOME/seasoned/config.yaml
#                             (fallback: ~/.config/seasoned/config.yaml)
# Install path (Windows):     %APPDATA%\seasoned\config.yaml

# Default pool. Required. Random picks are drawn from here when no season matches.
wallpaper_dir: ~/Pictures/wallpapers

# Recurse into subdirectories when scanning the default pool. Default: false.
recursive: false

# File extensions to consider. Default: jpg, jpeg, png, webp.
extensions: [jpg, jpeg, png, webp]

# Optional Linux backend override. If set, auto-detection is skipped.
# {{.Path}} is substituted with the shell-quoted absolute wallpaper path at apply time.
# linux:
#   command: "swww img {{.Path}}"

# Optional list of seasons. Priority: specific-date > annual-date >
# specific-range > annual-range > default pool. Within the same tier,
# overlapping dates are a config error.
#
# `path` may be a file (used directly) or a directory (random pick from it,
# with the same extension filter as the pool).
#
# `name` is optional — used only for `seasoned seasons` output and logs.
seasons:
  # Single recurring annual date (MM-DD).
  - name: winter-holiday
    date: "12-25"
    path: ~/Pictures/wallpapers/seasons/dec-25

  # Single specific date (YYYY-MM-DD) — only applies in that year.
  - date: "2026-04-05"
    path: ~/Pictures/wallpapers/seasons/2026-04-05.jpg

  # Recurring annual range (MM-DD..MM-DD), inclusive on both ends.
  - name: december
    date_range: "12-01..12-24"
    path: ~/Pictures/wallpapers/seasons/december

  # Specific-year range (YYYY-MM-DD..YYYY-MM-DD).
  - date_range: "2026-03-28..2026-03-30"
    path: ~/Pictures/wallpapers/seasons/spring-2026

  # Ranges wrapping the year boundary are supported.
  - name: year-turn
    date_range: "12-30..01-02"
    path: ~/Pictures/wallpapers/seasons/new-year

# Optional daemon block. Only read by `seasoned daemon`. All fields have
# defaults — an existing v1 config stays valid without this block.
# daemon:
#   # When the daemon rotates the wallpaper. Two modes:
#   #
#   # 1) List mode — fires at each listed clock time (local). Single value
#   #    or array. Default: "03:00".
#   #      rotation_at: "03:00"
#   #      rotation_at: ["00:00", "06:00", "12:00", "18:00"]
#   #
#   # 2) Anchor + interval mode — fires at rotation_at, then every
#   #    rotation_interval thereafter. rotation_at must be a single value
#   #    (or omitted, in which case 03:00 is the anchor). Minimum interval
#   #    is 1m — sub-minute rotation isn't meaningful.
#   #      rotation_at: "06:00"
#   #      rotation_interval: "8h"   # fires at 06:00, 14:00, 22:00
#   rotation_at: "03:00"
#   # rotation_interval: "12h"
#
#   # Safety-net forced re-evaluation ceiling on sleep between rotations.
#   # Protects against clock drift and missed wake events. Default: 6h.
#   refresh_interval: 6h
#
#   # Watch the config file for changes and hot-reload on write. Default: true.
#   watch_config: true
#
#   # Listen for org.freedesktop.login1 PrepareForSleep on Linux to re-apply
#   # on resume. Default: true on Linux, ignored elsewhere. Set false to rely
#   # on the drift-detection fallback only.
#   dbus_sleep_wake: true
#
#   # On POSIX, also accept control via sentinel files under
#   # $XDG_RUNTIME_DIR/seasoned/control/ (reload, kick) in addition to signals.
#   # Always enabled on Windows, regardless of this flag. Default: false.
#   sentinel_fallback: false
